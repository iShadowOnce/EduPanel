<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestion de anuncios</title>
    <link rel="stylesheet" th:href="@{/css/edupanel.css}">
</head>

<body>
    <header class="app-header">
        <div class="app-nav-dock">
            <a class="app-home-link" href="/" th:href="@{/}" aria-label="Volver al inicio">
                <span class="app-home-logo-frame">
                    <img src="/img/logo_atras.png" th:src="@{/img/logo_atras.png}" alt="EduPanel">
                </span>
            </a>

            <nav class="app-nav" aria-label="Navegacion principal">
                <a class="app-nav-link" href="/" th:href="@{/}">Inicio</a>
                <a class="app-nav-link" href="/informacion" th:href="@{/informacion}">Informacion</a>
                <a class="app-nav-link" href="/login" th:href="@{/login}">Iniciar sesion</a>
                <a class="app-nav-link app-nav-cta" href="/registro" th:href="@{/registro}">Registrarse</a>
            </nav>
        </div>
    </header>

    <h1>Gestion de anuncios</h1>

    <h2>Crear anuncio</h2>

    <p th:if="${error}" th:text="${error}" style="color:red;"></p>

    <form th:action="@{/profesor-jefe/anuncios/guardar}"
        th:object="${nuevoAnuncio}"
        method="post">

        <label>Titulo:</label>
        <input type="text" th:field="*{titulo}">
        <br>

        <label>Mensaje:</label>
        <textarea th:field="*{mensaje}"></textarea>
        <br>

        <label>Asignatura:</label>
        <select th:field="*{asignatura}">
            <option th:each="asignatura : ${asignaturas}"
                th:value="${asignatura}"
                th:text="${asignatura.nombre}">
            </option>
        </select>
        <br>

        <button type="submit">Publicar anuncio</button>
    </form>

    <hr>

    <h2>Anuncios publicados</h2>

    <p th:if="${anuncios == null or #lists.isEmpty(anuncios)}">
        Todavia no hay anuncios publicados.
    </p>

    <table th:if="${anuncios != null and !#lists.isEmpty(anuncios)}" border="1">
        <thead>
            <tr>
                <th>Titulo</th>
                <th>Mensaje</th>
                <th>Asignatura</th>
                <th>Publicado por</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="anuncio : ${anuncios}">
                <td th:text="${anuncio.titulo}"></td>
                <td th:text="${anuncio.mensaje}"></td>
                <td th:text="${anuncio.asignatura != null ? anuncio.asignatura.nombre : 'General'}"></td>
                <td th:text="${anuncio.profesorNombre}"></td>
                <td th:text="${anuncio.fechaPublicacion}"></td>
                <td>
                    <a th:href="@{/profesor-jefe/anuncios/{anuncioId}/editar(anuncioId=${anuncio.id})}">
                        Editar
                    </a>

                    |

                    <form th:action="@{/profesor-jefe/anuncios/{anuncioId}/eliminar(anuncioId=${anuncio.id})}"
                        method="post"
                        style="display:inline;">
                        <button type="submit">Eliminar</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <br>

    <a href="/profesor-jefe/dashboard">Volver al panel</a>

</body>

</html>
