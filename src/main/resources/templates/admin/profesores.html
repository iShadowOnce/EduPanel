<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Profesores registrados</title>
    <link rel="stylesheet" th:href="@{/css/edupanel.css}">
</head>

<body>
    <header class="app-header">
        <div class="app-nav-dock">
            <a class="app-home-link" href="/" th:href="@{/}" aria-label="Volver al inicio">
                <span class="app-home-logo-frame">
                    <img src="/img/logo_atras.png" th:src="@{/img/logo_atras.png}" alt="EduPanel">
                </span>
            </a>

            <nav class="app-nav" aria-label="Navegacion principal">
                <a class="app-nav-link" href="/" th:href="@{/}">Inicio</a>
                <a class="app-nav-link" href="/informacion" th:href="@{/informacion}">Informacion</a>
                <a class="app-nav-link" href="/login" th:href="@{/login}">Iniciar sesion</a>
                <a class="app-nav-link app-nav-cta" href="/registro" th:href="@{/registro}">Registrarse</a>
            </nav>
        </div>
    </header>

    <h1>Profesores registrados</h1>

    <table border="1">
        <thead>
            <tr>
                <th>UUID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>RUT</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Asignaturas</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="profesor : ${profesores}">
                <td th:text="${profesor.uid}"></td>
                <td th:text="${profesor.nombre}"></td>
                <td th:text="${profesor.apellido}"></td>
                <td th:text="${profesor.rut}"></td>
                <td th:text="${profesor.email}"></td>
                <td th:text="${profesor.rol}"></td>
                <td th:text="${profesor.asignaturas}"></td>

                <td>
                    <a th:href="@{/profesor-jefe/profesores/{id}/asignaturas(id=${profesor.uid})}">
                        Asignar asignaturas
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

    <br>
    <a href="/profesor-jefe/dashboard">Volver al panel</a>
    <a href="/profesor-jefe/cursos">Gestionar cursos</a>
    <br>
    <a href="/profesor-jefe/usuarios-pendientes">Volver a usuarios pendientes</a>
</body>

</html>
