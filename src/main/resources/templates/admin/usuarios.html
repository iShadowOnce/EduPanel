<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Usuarios pendientes</title>
    <link rel="stylesheet" th:href="@{/css/edupanel.css}">
</head>

<body>
    <header class="app-header">
        <div class="app-nav-dock">
            <a class="app-home-link" href="/" th:href="@{/}" aria-label="Volver al inicio">
                <span class="app-home-logo-frame">
                    <img src="/img/logo_atras.png" th:src="@{/img/logo_atras.png}" alt="EduPanel">
                </span>
            </a>

            <nav class="app-nav" aria-label="Navegacion principal">
                <a class="app-nav-link" href="/" th:href="@{/}">Inicio</a>
                <a class="app-nav-link" href="/informacion" th:href="@{/informacion}">Informacion</a>
                <a class="app-nav-link" href="/login" th:href="@{/login}">Iniciar sesion</a>
                <a class="app-nav-link app-nav-cta" href="/registro" th:href="@{/registro}">Registrarse</a>
            </nav>
        </div>
    </header>

    <h1>Usuarios pendientes</h1>

    <table border="1">
        <thead>
            <tr>
                <th>UUID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>RUT</th>
                <th>Email</th>
                <th>Rol actual</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="usuario : ${usuariosPendientes}">
                <td th:text="${usuario.uid}"></td>
                <td th:text="${usuario.nombre}"></td>
                <td th:text="${usuario.apellido}"></td>
                <td th:text="${usuario.rut}"></td>
                <td th:text="${usuario.email}"></td>
                <td th:text="${usuario.rol}"></td>
                <td>
                    <form th:action="@{/profesor-jefe/usuarios/{id}/asignar-alumno(id=${usuario.uid})}" method="post"
                        style="display:inline;">
                        <button type="submit">Asignar como alumno</button>
                    </form>

                    |

                    <form th:action="@{/profesor-jefe/usuarios/{id}/asignar-profesor(id=${usuario.uid})}" method="post"
                        style="display:inline;">
                        <button type="submit">Asignar como profesor</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <br>

    <a href="/profesor-jefe/dashboard">Volver al panel</a>

    <br>
    <a href="/profesor-jefe/profesores">Ver profesores registrados</a>
    <br>
    <a href="/profesor-jefe/cursos">Gestionar cursos</a>

</body>

</html>
