<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Alumnos</title>
    <link rel="stylesheet" th:href="@{/css/edupanel.css}">
</head>

<body>

    <h1>Lista de alumnos</h1>

    <p th:if="${error}" th:text="${error}" style="color:red;"></p>

    <table border="1">
        <thead>
            <tr>
                <th>UID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>RUT</th>
                <th>Email</th>
                <th>Promedio</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="alumno : ${alumnos}">
                <td th:text="${alumno.uid}"></td>
                <td th:text="${alumno.nombre}"></td>
                <td th:text="${alumno.apellido}"></td>
                <td th:text="${alumno.rut}"></td>
                <td th:text="${alumno.email}"></td>
                <td th:text="${alumno.calcularPromedio()}"></td>
                <td th:text="${alumno.obtenerEstadoAcademico()}"></td>
                <td>
                    <a th:if="${profesor != null}"
                        th:href="@{/profesor/{profesorId}/alumnos/{alumnoId}/notas(profesorId=${profesor.uid}, alumnoId=${alumno.uid})}">
                        Ver notas
                    </a>

                    <a th:if="${profesor == null}" th:href="@{/profesor/alumnos/{id}/editar(id=${alumno.uid})}">
                        Editar
                    </a>

                    <a th:if="${profesor == null}" th:href="@{/alumno/{id}/dashboard(id=${alumno.uid})}">
                        Entrar como alumno
                    </a>

                    <form th:if="${profesor == null}" th:action="@{/profesor/alumnos/{id}/eliminar(id=${alumno.uid})}" method="post"
                        style="display:inline;">
                        <button type="submit">Eliminar</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</body>

</html>
