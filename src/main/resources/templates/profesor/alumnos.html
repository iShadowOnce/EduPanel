<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Alumnos</title>
    <link rel="stylesheet" th:href="@{/css/edupanel.css}">
</head>

<body>
    <header class="app-header">
        <div class="app-nav-dock">
            <a class="app-home-link" href="/" th:href="@{/}" aria-label="Volver al inicio">
                <span class="app-home-logo-frame">
                    <img src="/img/logo_atras.png" th:src="@{/img/logo_atras.png}" alt="EduPanel">
                </span>
            </a>

            <nav class="app-nav" aria-label="Navegacion principal">
                <a class="app-nav-link" href="/" th:href="@{/}">Inicio</a>
                <a class="app-nav-link" href="/informacion" th:href="@{/informacion}">Informacion</a>
                <a class="app-nav-link" href="/login" th:href="@{/login}">Iniciar sesion</a>
                <a class="app-nav-link app-nav-cta" href="/registro" th:href="@{/registro}">Registrarse</a>
            </nav>
        </div>
    </header>

    <h1>Lista de alumnos</h1>

    <p th:if="${error}" th:text="${error}" style="color:red;"></p>

    <table border="1">
        <thead>
            <tr>
                <th>UID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>RUT</th>
                <th>Email</th>
                <th>Promedio</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="alumno : ${alumnos}">
                <td th:text="${alumno.uid}"></td>
                <td th:text="${alumno.nombre}"></td>
                <td th:text="${alumno.apellido}"></td>
                <td th:text="${alumno.rutFormateado}"></td>
                <td th:text="${alumno.email}"></td>
                <td th:text="${#numbers.formatDecimal(alumno.calcularPromedio(), 1, 1)}"></td>
                <td th:text="${alumno.obtenerEstadoAcademico()}"></td>
                <td>
                    <a th:if="${profesor != null}"
                        th:href="@{/profesor/{profesorId}/alumnos/{alumnoId}/notas(profesorId=${profesor.uid}, alumnoId=${alumno.uid})}">
                        Ver notas
                    </a>

                </td>
            </tr>
        </tbody>
    </table>

</body>

</html>
