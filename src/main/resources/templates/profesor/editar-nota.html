<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Nota</title>
    <link rel="stylesheet" th:href="@{/css/edupanel.css}">
</head>

<body>
    <header class="app-header">
        <div class="app-nav-dock">
            <a class="app-home-link" href="/" th:href="@{/}" aria-label="Volver al inicio">
                <span class="app-home-logo-frame">
                    <img src="/img/logo_atras.png" th:src="@{/img/logo_atras.png}" alt="EduPanel">
                </span>
            </a>

            <nav class="app-nav" aria-label="Navegacion principal">
                <a class="app-nav-link" href="/" th:href="@{/}">Inicio</a>
                <a class="app-nav-link" href="/informacion" th:href="@{/informacion}">Informacion</a>
                <a class="app-nav-link" href="/login" th:href="@{/login}">Iniciar sesion</a>
                <a class="app-nav-link app-nav-cta" href="/registro" th:href="@{/registro}">Registrarse</a>
            </nav>
        </div>
    </header>

    <h1>Editar nota</h1>

    <p th:if="${error}" th:text="${error}" style="color:red;"></p>

    <p>
        Alumno:
        <strong th:text="${alumno.nombre + ' ' + alumno.apellido}"></strong>
    </p>

    <form
        th:action="@{/profesor/{profesorId}/alumnos/{alumnoId}/notas/{notaId}/actualizar(profesorId=${profesor.uid}, alumnoId=${alumno.uid}, notaId=${calificacion.id})}"
        th:object="${calificacion}" method="post">

        <label>ID:</label>
        <input type="text" th:field="*{id}" readonly>
        <br>

        <label>Asignatura:</label>
        <select th:field="*{asignatura}">
            <option th:each="asignatura : ${asignaturas}"
                th:value="${asignatura}"
                th:text="${asignatura.nombre}">
            </option>
        </select>
        <br>

        <label>Nota:</label>
        <input type="number" step="0.1" min="1.0" max="7.0" th:field="*{nota}">
        <br>

        <label>Descripción:</label>
        <input type="text" th:field="*{descripcion}">
        <br>

        <button type="submit">Guardar cambios</button>
    </form>

    <br>

    <a th:href="@{/profesor/{profesorId}/alumnos/{alumnoId}/notas(profesorId=${profesor.uid}, alumnoId=${alumno.uid})}">
        Volver a notas
    </a>

</body>

</html>
