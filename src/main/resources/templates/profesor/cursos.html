<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cursos</title>
    <link rel="stylesheet" th:href="@{/css/edupanel.css}">
</head>

<body>
    <header class="app-header">
        <div class="app-nav-dock">
            <a class="app-home-link" href="/" th:href="@{/}" aria-label="Volver al inicio">
                <span class="app-home-logo-frame">
                    <img src="/img/logo_atras.png" th:src="@{/img/logo_atras.png}" alt="EduPanel">
                </span>
            </a>

            <nav class="app-nav" aria-label="Navegacion principal">
                <a class="app-nav-link" href="/" th:href="@{/}">Inicio</a>
                <a class="app-nav-link" href="/informacion" th:href="@{/informacion}">Informacion</a>
                <a class="app-nav-link" href="/login" th:href="@{/login}">Iniciar sesion</a>
                <a class="app-nav-link app-nav-cta" href="/registro" th:href="@{/registro}">Registrarse</a>
            </nav>
        </div>
    </header>

    <h1>Seleccionar curso</h1>

    <p>
        Profesor:
        <strong th:text="${profesor.nombre + ' ' + profesor.apellido}"></strong>
    </p>

    <p>
        Asignaturas:
        <strong th:text="${profesor.asignaturas}"></strong>
    </p>

    <p th:if="${cursos == null or #lists.isEmpty(cursos)}">
        No hay cursos disponibles.
    </p>

    <table th:if="${cursos != null and !#lists.isEmpty(cursos)}" border="1">
        <thead>
            <tr>
                <th>Curso</th>
                <th>Alumnos asignados</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="curso : ${cursos}">
                <td th:text="${curso.nombre}"></td>
                <td th:text="${curso.alumnosIds.size()}"></td>
                <td>
                    <a th:href="@{/profesor/{profesorId}/cursos/{cursoId}/alumnos(profesorId=${profesor.uid}, cursoId=${curso.id})}">
                        Ver alumnos
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

    <br>

    <a th:href="@{/profesor/{id}/dashboard(id=${profesor.uid})}">
        Volver al panel
    </a>

</body>

</html>
