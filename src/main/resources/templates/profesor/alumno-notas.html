<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Notas del alumno</title>
    <link rel="stylesheet" th:href="@{/css/edupanel.css}">
</head>

<body>
    <header class="app-header">
        <div class="app-nav-dock">
            <a class="app-home-link" href="/" th:href="@{/}" aria-label="Volver al inicio">
                <span class="app-home-logo-frame">
                    <img src="/img/logo_atras.png" th:src="@{/img/logo_atras.png}" alt="EduPanel">
                </span>
            </a>

            <nav class="app-nav" aria-label="Navegacion principal">
                <a class="app-nav-link" href="/" th:href="@{/}">Inicio</a>
                <a class="app-nav-link" href="/informacion" th:href="@{/informacion}">Informacion</a>
                <a class="app-nav-link" href="/login" th:href="@{/login}">Iniciar sesion</a>
                <a class="app-nav-link app-nav-cta" href="/registro" th:href="@{/registro}">Registrarse</a>
            </nav>
        </div>
    </header>

    <h1>Notas del alumno</h1>

    <p>
        Alumno:
        <strong th:text="${alumno.nombre + ' ' + alumno.apellido}"></strong>
    </p>
    <p>
        Promedio:
        <strong th:text="${alumno.calcularPromedio()}"></strong>
    </p>
    <p>
        Estado:
        <strong th:text="${alumno.obtenerEstadoAcademico()}"></strong>
    </p>

    <h2>Agregar calificaciÃ³n</h2>

    <p th:if="${error}" th:text="${error}" style="color:red;"></p>

    <form th:if="${profesor != null}"
        th:action="@{/profesor/{profesorId}/alumnos/{alumnoId}/notas/guardar(profesorId=${profesor.uid}, alumnoId=${alumno.uid})}"
        th:object="${nuevaCalificacion}" method="post">

        <label>Asignatura:</label>
        <select th:field="*{asignatura}">
            <option th:each="asignatura : ${asignaturas}" th:value="${asignatura}" th:text="${asignatura}">
            </option>
        </select>

        <br>

        <label>Nota:</label>
        <input type="number" step="0.1" min="1.0" max="7.0" th:field="*{nota}">

        <br>

        <label>DescripciÃ³n:</label>
        <input type="text" th:field="*{descripcion}">

        <br>

        <button type="submit">Guardar nota</button>
    </form>

    <hr>

    <h2>Notas registradas</h2>

    <table border="1">
        <thead>
            <tr>
                <th>Asignatura</th>
                <th>Nota</th>
                <th>DescripciÃ³n</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="nota : ${alumno.notas}">
                <td th:text="${nota.id}"></td>
                <td th:text="${nota.asignatura}"></td>
                <td th:text="${nota.nota}"></td>
                <td th:text="${nota.descripcion}"></td>
                <td>
                    <a
                        th:href="@{/profesor/{profesorId}/alumnos/{alumnoId}/notas/{notaId}/editar(profesorId=${profesor.uid}, alumnoId=${alumno.uid}, notaId=${nota.id})}">
                        Editar
                    </a>

                    |

                    <form
                        th:action="@{/profesor/{profesorId}/alumnos/{alumnoId}/notas/{notaId}/eliminar(profesorId=${profesor.uid}, alumnoId=${alumno.uid}, notaId=${nota.id})}"
                        method="post" style="display:inline;">
                        <button type="submit">Eliminar</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <br>

    <a th:if="${profesor != null}" th:href="@{/profesor/{id}/alumnos(id=${profesor.uid})}">
        Volver a alumnos
    </a>

</body>

</html>
