<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Dashboard Alumno</title>
    <link rel="stylesheet" th:href="@{/css/edupanel.css}">
</head>

<body>
    <header class="app-header">
        <div class="app-nav-dock">
            <a class="app-home-link" href="/" th:href="@{/}" aria-label="Volver al inicio">
                <span class="app-home-logo-frame">
                    <img src="/img/logo_atras.png" th:src="@{/img/logo_atras.png}" alt="EduPanel">
                </span>
            </a>

            <nav class="app-nav" aria-label="Navegacion principal">
                <a class="app-nav-link" href="/" th:href="@{/}">Inicio</a>
                <a class="app-nav-link" href="/informacion" th:href="@{/informacion}">Informacion</a>
                <a class="app-nav-link" href="/login" th:href="@{/login}">Iniciar sesion</a>
                <a class="app-nav-link app-nav-cta" href="/registro" th:href="@{/registro}">Registrarse</a>
            </nav>
        </div>
    </header>

    <h1>Panel del Alumno</h1>

    <p>
        Alumno:
        <strong th:text="${alumno.nombre + ' ' + alumno.apellido}"></strong>
    </p>

    <p>
        Correo:
        <strong th:text="${alumno.email}"></strong>
    </p>

    <p th:if="${curso != null}">
        Curso:
        <strong th:text="${curso.nombre}"></strong>
    </p>

    <p th:if="${curso == null}" style="color:red;">
        Aun no tienes un curso asignado.
    </p>

    <p>
        Promedio general:
        <strong th:text="${#numbers.formatDecimal(alumno.calcularPromedio(), 1, 1)}"></strong>
    </p>

    <p>
        Estado:
        <strong th:text="${alumno.obtenerEstadoAcademico()}"></strong>
    </p>

    <p>
        <a th:href="@{/alumno/{id}/notas(id=${alumno.uid})}">
            Ver calificaciones
        </a>
    </p>

    <hr>

    <h2>Anuncios recientes</h2>

    <p th:if="${anuncios == null or #lists.isEmpty(anuncios)}">
        No hay anuncios publicados.
    </p>

    <table th:if="${anuncios != null and !#lists.isEmpty(anuncios)}" border="1">
        <thead>
            <tr>
                <th>Titulo</th>
                <th>Asignatura</th>
                <th>Profesor</th>
                <th>Mensaje</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="anuncio : ${anuncios}">
                <td th:text="${anuncio.titulo}"></td>
                <td th:text="${anuncio.asignatura != null ? anuncio.asignatura.nombre : 'General'}"></td>
                <td th:text="${anuncio.profesorNombre}"></td>
                <td th:text="${anuncio.mensaje}"></td>
            </tr>
        </tbody>
    </table>

    <p>
        <a th:href="@{/alumno/{id}/anuncios(id=${alumno.uid})}">
            Ver todos los anuncios
        </a>
    </p>

    <form th:action="@{/logout}" method="post">
        <button type="submit">Cerrar sesion</button>
    </form>

</body>

</html>
