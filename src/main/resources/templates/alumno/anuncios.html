<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Anuncios</title>
    <link rel="stylesheet" th:href="@{/css/edupanel.css}">
</head>

<body>
    <header class="app-header">
        <div class="app-nav-dock">
            <a class="app-home-link" href="/" th:href="@{/}" aria-label="Volver al inicio">
                <span class="app-home-logo-frame">
                    <img src="/img/logo_atras.png" th:src="@{/img/logo_atras.png}" alt="EduPanel">
                </span>
            </a>

            <nav class="app-nav" aria-label="Navegacion principal">
                <a class="app-nav-link" href="/" th:href="@{/}">Inicio</a>
                <a class="app-nav-link" href="/informacion" th:href="@{/informacion}">Informacion</a>
                <a class="app-nav-link" href="/login" th:href="@{/login}">Iniciar sesion</a>
                <a class="app-nav-link app-nav-cta" href="/registro" th:href="@{/registro}">Registrarse</a>
            </nav>
        </div>
    </header>

    <h1>Anuncios</h1>

    <p>
        Alumno:
        <strong th:text="${alumno.nombre + ' ' + alumno.apellido}"></strong>
    </p>

    <p th:if="${curso != null}">
        Curso:
        <strong th:text="${curso.nombre}"></strong>
    </p>

    <p th:if="${curso == null}" style="color:red;">
        Sin curso asignado.
    </p>

    <table border="1">
        <thead>
            <tr>
                <th>Título</th>
                <th>Mensaje</th>
                <th>Asignatura</th>
                <th>Fecha</th>
                <th>Profesor</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="anuncio : ${anuncios}">
                <td th:text="${anuncio.titulo}"></td>
                <td th:text="${anuncio.mensaje}"></td>
                <td th:text="${anuncio.asignatura}"></td>
                <td th:text="${anuncio.fechaPublicacion}"></td>
                <td th:text="${anuncio.profesorNombre}"></td>
            </tr>
        </tbody>
    </table>

    <br>

    <a th:href="@{/alumno/{id}/dashboard(id=${alumno.uid})}">
        Volver al dashboard
    </a>

</body>

</html>
