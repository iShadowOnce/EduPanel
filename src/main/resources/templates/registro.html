<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Registro | EduPanel</title>
    <link rel="stylesheet" th:href="@{/css/edupanel.css}">
</head>

<body>
    <header class="app-header">
        <div class="app-nav-dock">
            <a class="app-home-link" href="/" th:href="@{/}" aria-label="Volver al inicio">
                <span class="app-home-logo-frame">
                    <img src="/img/logo_atras.png" th:src="@{/img/logo_atras.png}" alt="EduPanel">
                </span>
            </a>

            <nav class="app-nav" aria-label="Navegacion principal">
                <a class="app-nav-link" href="/" th:href="@{/}">Inicio</a>
                <a class="app-nav-link" href="/informacion" th:href="@{/informacion}">Informacion</a>
                <a class="app-nav-link" href="/login" th:href="@{/login}">Iniciar sesion</a>
                <a class="app-nav-link app-nav-cta active" href="/registro" th:href="@{/registro}">Registrarse</a>
            </nav>
        </div>
    </header>

    <h1>Registro de usuario</h1>

    <p>
        Completa tus datos. Tu cuenta quedará pendiente hasta que un profesor jefe te asigne un rol.
    </p>

    <p th:if="${error}" th:text="${error}" style="color:red;"></p>

    <form th:action="@{/registro}" th:object="${nuevoUsuario}" method="post">

        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}">
        <br><br>

        <label>Apellido:</label>
        <input type="text" th:field="*{apellido}">
        <br><br>

        <label>RUT:</label>
        <input type="text" th:field="*{rut}">
        <br><br>

        <label>Email:</label>
        <input type="email" th:field="*{email}">
        <br><br>

        <label>Contrasena:</label>
        <input type="password" th:field="*{password}">
        <br><br>

        <button type="submit">Registrarme</button>

    </form>

    <br>

    <a href="/login">Ya tengo cuenta</a>
    <br>
    <a href="/">Volver al inicio</a>

</body>

</html>
