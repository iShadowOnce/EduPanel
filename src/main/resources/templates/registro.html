<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | EduPanel</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="register-page">

    <!-- Efecto de brillo de fondo sutil -->
    <div class="background-glow"></div>

    <!-- Contenedor del Formulario -->
    <main class="register-card">

        <!-- Botón Volver -->
        <a href="index.html" class="back-link">
            <svg class="back-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6"/>
            </svg>
            Volver al inicio
        </a>

        <!-- Encabezado -->
        <section class="register-header">
            <div class="register-main-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <line x1="19" y1="8" x2="19" y2="14"/>
                    <line x1="22" y1="11" x2="16" y2="11"/>
                </svg>
            </div>

            <h1>Crear Cuenta</h1>
            <p>Únete a EduPanel y gestiona tus notas.</p>
        </section>

        <!-- Formulario -->
        <form action="#" method="POST" class="register-form">

            <!-- Fila: Nombre y Apellido -->
            <div class="form-row">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input
                        type="text"
                        id="nombre"
                        name="nombre"
                        placeholder="Ej. Juan"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input
                        type="text"
                        id="apellido"
                        name="apellido"
                        placeholder="Ej. Pérez"
                        required
                    >
                </div>
            </div>

            <!-- Campo RUT -->
            <div class="form-group">
                <label for="rut">RUT</label>
                <input
                    type="text"
                    id="rut"
                    name="rut"
                    placeholder="12.345.678-9"
                    required
                >
            </div>

            <!-- Campo Email -->
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="nombre@institucion.edu"
                    required
                >
            </div>

            <!-- Campo Contraseña -->
            <div class="form-group password-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Crea una contraseña segura"
                    required
                >
            </div>

            <!-- Botón Registro -->
            <button type="submit" class="register-button">
                Registrarse
            </button>

        </form>

        <!-- Iniciar sesión alternativo -->
        <p class="login-text">
            ¿Ya tienes una cuenta?
            <a href="login.html">Inicia sesión aquí</a>
        </p>

    </main>

</body>
</html>
