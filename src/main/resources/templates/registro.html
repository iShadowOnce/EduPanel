<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | EduPanel</title>
    <link rel="stylesheet" th:href="@{/css/edupanel.css}">
</head>

<body class="auth-page register-page">
    <header class="app-header">
        <div class="app-nav-dock">
            <a class="app-home-link" href="/" th:href="@{/}" aria-label="Volver al inicio">
                <span class="app-home-logo-frame">
                    <img src="/img/logo_atras.png" th:src="@{/img/logo_atras.png}" alt="EduPanel">
                </span>
            </a>

            <nav class="app-nav" aria-label="Navegacion principal">
                <a class="app-nav-link" href="/" th:href="@{/}">Inicio</a>
                <a class="app-nav-link" href="/informacion" th:href="@{/informacion}">Informacion</a>
                <a class="app-nav-link" href="/login" th:href="@{/login}">Iniciar sesion</a>
                <a class="app-nav-link app-nav-cta active" href="/registro" th:href="@{/registro}">Solicitar Acceso</a>
            </nav>
        </div>
    </header>

    <main class="auth-main">
        <section class="auth-card register-card" aria-labelledby="register-title">
            <div class="auth-card-header">
                <h1 id="register-title">Crear una cuenta</h1>
                <p>Completa tus datos. Tu cuenta quedara pendiente hasta que un administrador te asigne un rol.</p>
            </div>

            <p class="auth-error" th:if="${error}" th:text="${error}"></p>

            <form class="auth-form" th:action="@{/registro}" th:object="${nuevoUsuario}" method="post">
                <div class="auth-field">
                    <label for="nombre">Nombre</label>
                    <input
                        id="nombre"
                        class="auth-control"
                        type="text"
                        th:field="*{nombre}"
                        placeholder="Ej. Juan"
                        required>
                </div>

                <div class="auth-field">
                    <label for="apellido">Apellido</label>
                    <input
                        id="apellido"
                        class="auth-control"
                        type="text"
                        th:field="*{apellido}"
                        placeholder="Ej. Perez"
                        required>
                </div>

                <div class="auth-field">
                    <label for="rut">RUT</label>
                    <input
                        id="rut"
                        class="auth-control"
                        type="text"
                        th:field="*{rut}"
                        placeholder="Ej. 12.345.678-5"
                        maxlength="12"
                        pattern="(?:[0-9]{1,8}|[0-9]{1,3}(?:\.[0-9]{3}){1,2})-?[0-9kK]"
                        title="Ingresa hasta 8 numeros y un digito verificador; se acepta K o k"
                        autocapitalize="characters"
                        required>
                </div>

                <div class="auth-field">
                    <label for="email">Email</label>
                    <input
                        id="email"
                        class="auth-control"
                        type="email"
                        th:field="*{email}"
                        placeholder="nombre@correo.com"
                        required>
                </div>

                <div class="auth-field">
                    <label for="password">Contraseña</label>
                    <input
                        id="password"
                        class="auth-control"
                        type="password"
                        th:field="*{password}"
                        minlength="6"
                        placeholder="Minimo 6 caracteres"
                        required>
                </div>

                <div class="auth-actions">
                    <button class="landing-btn landing-btn-primary" type="submit">Solicitar Acceso</button>
                </div>
            </form>

            <p class="auth-register-prompt">
                Ya tienes una cuenta registrada?
                <a href="/login" th:href="@{/login}">Inicia sesion aqui</a>
            </p>
        </section>
    </main>

    <footer class="landing-footer">
        <span>&copy; EduPanel. Desarrollado por Joaquin Astudillo y Cristobal Herrera.</span>
        <a
            class="landing-github-link"
            href="https://github.com/iShadowOnce/EduPanel"
            target="_blank"
            rel="noopener noreferrer">
            GitHub
        </a>
    </footer>

</body>

</html>
