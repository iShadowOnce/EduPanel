<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | EduPanel</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="login-page">

    <!-- Efecto de brillo de fondo sutil -->
    <div class="background-glow"></div>

    <!-- Contenedor del Formulario -->
    <main class="login-card">

        <!-- Botón Volver -->
        <a href="index.html" class="back-link">
            <svg class="back-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6"/>
            </svg>
            Volver al inicio
        </a>

        <!-- Encabezado -->
        <section class="login-header">
            <div class="login-main-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
                </svg>
            </div>

            <h1>Iniciar Sesión</h1>
            <p>Ingresa tus credenciales para continuar.</p>
        </section>

        <!-- Formulario -->
        <form action="#" method="POST" class="login-form">

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="nombre@institucion.edu"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    required
                >
            </div>

            <div class="forgot-password">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="login-button">
                Continuar
            </button>
        </form>

        <!-- Registro -->
        <p class="register-text">
            ¿Aún no tienes una cuenta?
            <br class="mobile-break">
            <a href="#">Solicita acceso a tu institución</a>
        </p>

    </main>

</body>
</html>
