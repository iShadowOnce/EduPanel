<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Nota</title>
</head>

<body>

    <h1>Editar nota</h1>

    <p th:if="${error}" th:text="${error}" style="color:red;"></p>

    <p>
        Alumno:
        <strong th:text="${alumno.nombre + ' ' + alumno.apellido}"></strong>
    </p>

    <form
        th:action="@{/profesor/alumnos/{alumnoId}/notas/{notaId}/actualizar(alumnoId=${alumno.uid}, notaId=${calificacion.id})}"
        th:object="${calificacion}" method="post">

        <label>ID:</label>
        <input type="text" th:field="*{id}" readonly>
        <br>

        <label>Asignatura:</label>
        <select th:field="*{asignatura}">
            <option value="MATEMATICAS">Matemáticas</option>
            <option value="LENGUAJE">Lenguaje</option>
            <option value="CIENCIAS_NATURALES">Ciencias Naturales</option>
            <option value="INGLES">Inglés</option>
            <option value="HISTORIA">Historia</option>
            <option value="ARTES">Artes</option>
            <option value="EDUCACION_FISICA">Educación Física</option>
            <option value="MUSICA">Música</option>
        </select>
        <br>

        <label>Nota:</label>
        <input type="number" step="0.1" min="1.0" max="7.0" th:field="*{nota}">
        <br>

        <label>Descripción:</label>
        <input type="text" th:field="*{descripcion}">
        <br>

        <button type="submit">Guardar cambios</button>
    </form>

    <br>

    <a th:href="@{/profesor/alumnos/{id}/notas(id=${alumno.uid})}">
        Volver a notas
    </a>

</body>

</html>
