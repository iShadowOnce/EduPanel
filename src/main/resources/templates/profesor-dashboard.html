<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Profesor</title>
    <link rel="stylesheet" th:href="@{/css/edupanel.css}">
</head>
<body>

<h1>Panel del Profesor</h1>

<p>
    Profesor:
    <strong th:text="${profesor.nombre + ' ' + profesor.apellido}"></strong>
</p>

<p>
    Email:
    <strong th:text="${profesor.email}"></strong>
</p>

<p>
    Asignaturas asignadas:
    <strong th:text="${profesor.asignaturas}"></strong>
</p>

<ul>
    <li>
        <a th:href="@{/profesor/{id}/alumnos(id=${profesor.uid})}">
            Gestionar notas
        </a>
    </li>

    <li>
        <a th:href="@{/profesor/{id}/anuncios(id=${profesor.uid})}">
            Gestionar mis anuncios
        </a>
    </li>
</ul>

</body>
</html>
