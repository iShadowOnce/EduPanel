spring.application.name=edupanel

# NOTA CHATGPT YA QUE TUVE PROBLEMAS CON LOS PERFILES DE SPRING
# Perfil por defecto: memoria. No se activa Firebase para que la app siga funcionando sin credenciales.
# Cuando Firebase este implementado, ejecutar con:
#   --spring.profiles.active=firebase

# NOTA JOACO: debes crear el proyecto Realtime Database/Auth y dejar
# el archivo de cuenta de servicio en src/main/resources/firebase-config.json.
# Ese archivo esta en .gitignore y no debeS subirlo al repositorio.
firebase.service-account=firebase-config.json
firebase.database-url=https://poocalificaciones-default-rtdb.firebaseio.com
